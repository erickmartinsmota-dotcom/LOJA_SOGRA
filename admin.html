<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeAura Boutique | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #1E5631; --dourado: #D4AF37; --creme: #FDFBF7; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--creme); margin: 0; color: #333; }
        
        header { background: white; padding: 25px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        header h1 { font-family: 'Cinzel', serif; color: var(--verde); margin: 0; font-size: 2rem; letter-spacing: 3px; }

        /* Filtros */
        .filtros { display: flex; justify-content: center; gap: 15px; padding: 20px; background: white; border-bottom: 1px solid #eee; flex-wrap: wrap; }
        .filtros select { padding: 12px 20px; border-radius: 5px; border: 1px solid #ddd; background: white; font-family: 'Montserrat', sans-serif; cursor: pointer; min-width: 180px; }

        /* Vitrine */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 0; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.03); transition: 0.4s; border: 1px solid #f0f0f0; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .card img { width: 100%; height: 380px; object-fit: cover; }
        
        .card-info { padding: 20px; text-align: center; flex-grow: 1; }
        .card-info h3 { font-family: 'Cinzel', serif; font-size: 0.95rem; margin: 0 0 10px 0; color: #222; text-transform: uppercase; letter-spacing: 1px; }
        .card-info .categoria { font-size: 0.75rem; color: var(--dourado); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-info .preco { color: var(--verde); font-weight: bold; font-size: 1.2rem; }

        .btn-comprar { background: var(--verde); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-comprar:hover { background: #143d22; }

        footer { background: #111; color: white; padding: 60px 20px; text-align: center; margin-top: 50px; }
        footer p { opacity: 0.6; font-size: 0.8rem; letter-spacing: 1px; }
        .link-admin { color: #444; text-decoration: none; font-size: 0.7rem; display: inline-block; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <h1>TE AURA BOUTIQUE</h1>
    </header>

    <div class="filtros">
        <select id="filtro-genero" onchange="window.filtrar()">
            <option value="Todos">Todos os Gêneros</option>
            <option value="Feminino">Feminino</option>
            <option value="Masculino">Masculino</option>
        </select>
        <select id="filtro-categoria" onchange="window.filtrar()">
            <option value="Todas">Todas as Categorias</option>
            <option value="Kits Mães">🎁 Kits Dia das Mães</option>
            <option value="Loções">Loções</option>
            <option value="Perfumes">Perfumes</option>
            <option value="Bolsas">Bolsas</option>
            <option value="Roupas">Roupas</option>
            <option value="Sapatos">Sapatos</option>
            <option value="Outros">Outros</option>
        </select>
    </div>

    <main>
        <div id="vitrine-produtos" class="vitrine"></div>
    </main>

    <footer>
        <p>TE AURA BOUTIQUE &copy; 2026</p>
        <a href="login.html" class="link-admin">TE AURA</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCA00i6Jpjk_SFQjda-WMN2Q-QDaLEPNS8", 
            authDomain: "lojinha-da-sogra.firebaseapp.com", 
            projectId: "lojinha-da-sogra", 
            storageBucket: "lojinha-da-sogra.firebasestorage.app", 
            messagingSenderId: "637321141515", 
            appId: "1:637321141515:web:715fdc3a661491d7e4d60e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let todosProdutos = [];

        async function carregar() {
            const snap = await getDocs(collection(db, "produtos"));
            todosProdutos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            window.filtrar();
        }

        window.filtrar = () => {
            const gen = document.getElementById('filtro-genero').value;
            const cat = document.getElementById('filtro-categoria').value;
            const vitrine = document.getElementById('vitrine-produtos');
            
            let filtrados = todosProdutos.filter(p => {
                const bateG = gen === "Todos" || p.genero === gen;
                const bateC = cat === "Todas" || p.categoria === cat;
                return bateG && bateC;
            });

            vitrine.innerHTML = filtrados.map(p => `
                <div class="card">
                    <img src="${p.imagem}" alt="${p.nome}">
                    <div class="card-info">
                        <span class="categoria">${p.categoria || 'Geral'}</span>
                        <h3>${p.nome}</h3>
                        <p class="preco">R$ ${Number(p.preco).toFixed(2)}</p>
                    </div>
                    <button class="btn-comprar" onclick="window.comprar('${p.nome}', '${p.preco}')">
                        Comprar Agora
                    </button>
                </div>
            `).join('');
        };

        window.comprar = (produto, valor) => {
            const fone = "55219XXXXXXXX"; // Substitua pelo seu número real
            const texto = encodeURIComponent(`Olá! Vi o produto ${produto} (R$ ${Number(valor).toFixed(2)}) no site e gostaria de saber mais.`);
            window.open(`https://api.whatsapp.com/send?phone=${fone}&text=${texto}`, '_blank');
        };

        carregar();
    </script>
</body>
</html>
