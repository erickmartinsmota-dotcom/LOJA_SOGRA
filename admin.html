<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | TeAura Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { font-family: 'Cinzel', serif; text-align: center; color: #1E5631; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #1E5631; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        button:hover { background: #143d22; }
        .aviso { background: #e7f3ef; padding: 10px; border-radius: 5px; font-size: 0.8rem; color: #1E5631; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Painel Administrativo</h2>
    <p style="text-align: center; font-size: 0.8rem;">Cadastre novos produtos na TeAura Boutique</p>

    <form id="form-produto">
        <label>Nome do Produto</label>
        <input type="text" id="nome" placeholder="Ex: Kit Spa Dia das Mães" required>

        <label>Preço (Somente números)</label>
        <input type="number" id="preco" step="0.01" placeholder="Ex: 149.90" required>

        <label>Categoria</label>
        <select id="categoria" required>
            <option value="">Selecione uma categoria...</option>
            <option value="Kits Mães">🎁 Kits Dia das Mães</option>
            <option value="Loções">Loções</option>
            <option value="Perfumes">Perfumes</option>
            <option value="Bolsas">Bolsas</option>
            <option value="Roupas">Roupas</option>
            <option value="Sapatos">Sapatos</option>
            <option value="Outros">Outros</option>
        </select>

        <label>Gênero</label>
        <select id="genero">
            <option value="Feminino">Feminino</option>
            <option value="Masculino">Masculino</option>
            <option value="Todos">Unissex / Todos</option>
        </select>

        <label>Tamanhos (Separe por vírgula)</label>
        <input type="text" id="tamanhos" placeholder="Ex: P, M, G ou 36, 38, 40">

        <label>Link da Imagem Principal</label>
        <input type="url" id="imagem" placeholder="https://link-da-foto.jpg" required>

        <label>Links de Outras Fotos (Separe por vírgula)</label>
        <textarea id="imagens_extra" rows="2" placeholder="Link1, Link2, Link3..."></textarea>

        <label>Descrição Curta</label>
        <textarea id="descricao" rows="3" placeholder="Detalhes do produto..."></textarea>

        <button type="submit">Cadastrar Produto</button>
    </form>
    <div id="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCA00i6Jpjk_SFQjda-WMN2Q-QDaLEPNS8", 
        authDomain: "lojinha-da-sogra.firebaseapp.com", 
        projectId: "lojinha-da-sogra", 
        storageBucket: "lojinha-da-sogra.firebasestorage.app", 
        messagingSenderId: "637321141515", 
        appId: "1:637321141515:web:715fdc3a661491d7e4d60e" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('form-produto').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "Cadastrando...";
        btn.disabled = true;

        const imagensExtra = document.getElementById('imagens_extra').value;
        const listaImagens = [document.getElementById('imagem').value];
        if(imagensExtra) {
            imagensExtra.split(',').forEach(link => listaImagens.push(link.trim()));
        }

        const novoProduto = {
            nome: document.getElementById('nome').value,
            preco: parseFloat(document.getElementById('preco').value),
            categoria: document.getElementById('categoria').value,
            genero: document.getElementById('genero').value,
            tamanhos: document.getElementById('tamanhos').value,
            imagens: listaImagens,
            descricao: document.getElementById('descricao').value,
            data_cadastro: new Date()
        };

        try {
            await addDoc(collection(db, "produtos"), novoProduto);
            alert("Sucesso! Produto disponível na TeAura Boutique.");
            e.target.reset();
        } catch (erro) {
            console.error(erro);
            alert("Erro ao cadastrar. Verifique a conexão.");
        } finally {
            btn.innerText = "Cadastrar Produto";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
