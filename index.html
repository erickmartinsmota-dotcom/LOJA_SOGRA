<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeAura Boutique | Cosméticos & Moda</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --dourado: #D4AF37; 
            --verde-luxo: #1E5631; 
            --branco-creme: #FDFBF7; 
            --preto-suave: #222; 
        }

        /* FUNDO DE MÁRMORE */
        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--branco-creme); 
            background-image: url('https://www.transparenttextures.com/patterns/white-marble.png'); 
            color: var(--preto-suave); 
        }

        /* CABEÇALHO COMPLETO FIXO (Logo + Menus) */
        .cabecalho-global {
            position: sticky; top: 0; z-index: 1000;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 10px 5px 8px 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            border-bottom: 2px solid #E5D3B3;
        }
        .logo-compacto {
            font-family: 'Cinzel', serif; font-size: 1.8rem; margin: 0 0 2px 0; letter-spacing: 2px;
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700;
        }
        .luxury-subtitle-compacto {
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; color: var(--dourado); margin-bottom: 8px; display: block;
        }

        /* NAVEGAÇÃO / BOTÕES (Efeito Carrossel para Celular) */
        #nav-categorias, .nav-genero { 
            display: flex; gap: 8px; 
            overflow-x: auto; 
            white-space: nowrap; 
            padding: 5px 10px 10px 10px;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }
        #nav-categorias::-webkit-scrollbar, .nav-genero::-webkit-scrollbar { display: none; }

        @media (min-width: 768px) {
            #nav-categorias, .nav-genero { justify-content: center; overflow-x: hidden; }
            .logo-compacto { font-size: 2.2rem; }
        }

        #nav-categorias button { 
            flex-shrink: 0;
            background: white; border: 1px solid var(--verde-luxo); color: var(--verde-luxo); 
            padding: 8px 16px; cursor: pointer; transition: 0.3s; font-weight: 600; border-radius: 4px; font-size: 0.85rem;
        }
        #nav-categorias button:hover, #nav-categorias button.ativo { background-color: var(--verde-luxo); color: white; }

        /* Estilo especial para o botão de Dia das Mães */
        #nav-categorias button.btn-maes:hover, #nav-categorias button.btn-maes.ativo { 
            background-color: #c9184a !important; color: white !important; border-color: #c9184a !important; 
        }

        .nav-genero { margin-top: 5px; border-top: 1px solid #eee; padding-top: 8px; }
        .nav-genero button { 
            flex-shrink: 0; border: 1px solid var(--dourado); color: var(--dourado); border-radius: 20px; 
            font-size: 0.75rem; padding: 6px 18px; cursor: pointer; transition: 0.3s; background: white; font-weight: 600;
        }
        .nav-genero button:hover, .nav-genero button.ativo { background-color: var(--dourado); color: white; }

        /* VITRINE */
        .container { max-width: 1200px; margin: 0 auto 60px auto; padding: 0 15px; }
        .titulo-colecao { font-family: 'Cinzel', serif; text-align: center; color: var(--verde-luxo); font-size: 1.8rem; margin: 30px 0 20px 0; text-transform: uppercase; letter-spacing: 2px; }
        #vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .produto { background: white; padding: 15px; text-align: center; border-radius: 12px; border: 1px solid #E5D3B3; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .produto img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; }

        .btn-adicionar { 
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728); 
            color: #442d00; font-weight: bold; border: none; padding: 12px; width: 100%; cursor: pointer; margin-top: 10px; border-radius: 25px; text-transform: uppercase; font-size: 0.8rem;
        }

        /* CARRINHO */
        .carrinho-oculto { display: none; }
        .carrinho-visivel { position: fixed; right: 0; top: 0; width: 100%; max-width: 350px; height: 100%; background: white; z-index: 2000; padding: 20px; box-shadow: -5px 0 20px rgba(0,0,0,0.2); overflow-y: auto; }

        /* RODAPÉ */
        footer { border-top: 1px solid #E5D3B3; text-align: center; padding: 40px 20px; margin-top: 50px; }
    </style>
</head>
<body>

    <header class="cabecalho-global">
        <h1 class="logo-compacto">TE AURA</h1>
        <span class="luxury-subtitle-compacto">Boutique | Cosméticos & Moda</span>
        
        <nav id="nav-categorias">
            <button onclick="filtrarCategoria('Todas')" class="ativo">Todas</button>
            <button onclick="filtrarCategoria('Kits Mães')" class="btn-maes" style="border-color: #c9184a; color: #c9184a;">🎁 Dia das Mães</button>
            <button onclick="filtrarCategoria('Loções')">Loções</button>
            <button onclick="filtrarCategoria('Perfumes')">Perfumes</button>
            <button onclick="filtrarCategoria('Bolsas')">Bolsas</button>
            <button onclick="filtrarCategoria('Roupas')">Roupas</button>
            <button onclick="filtrarCategoria('Sapatos')">Sapatos</button>
            <button onclick="filtrarCategoria('Outros')">Outros</button>
        </nav>
        
        <nav class="nav-genero" id="nav-genero">
            <button onclick="filtrarGenero('Todos')" class="ativo">Todos</button>
            <button onclick="filtrarGenero('Feminino')">Feminino</button>
            <button onclick="filtrarGenero('Masculino')">Masculino</button>
        </nav>
    </header>

    <div class="container">
        <h2 class="titulo-colecao">Coleção Exclusiva</h2>
        <div id="vitrine"></div>
    </div>

    <footer>
        <h2 style="font-family: 'Cinzel', serif; color: var(--verde-luxo);">TE AURA</h2>
        <p style="font-size: 0.8rem; color: #888;">©  TeAura Boutique - Todos os direitos reservados</p>
        <div style="margin-top: 15px;">
            <a href="login.html" style="color: var(--dourado); text-decoration: none; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;">2026</a>
        </div>
    </footer>

    <div id="carrinho" class="carrinho-oculto">
        <button onclick="voltarParaLoja()" style="float:right; border:none; color:red; cursor:pointer;">[X] FECHAR</button>
        <h3>Seu Carrinho</h3>
        <div id="itens-carrinho"></div>
        <p><strong>Total: R$ <span id="valor-total">0.00</span></strong></p>
        <button class="btn-adicionar" style="background: #25D366; color:white;" onclick="enviarParaWhatsApp()">Pedir via WhatsApp</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const TELEFONE_WHATSAPP = "558695105264"; 
        const firebaseConfig = { 
            apiKey: "AIzaSyCA00i6Jpjk_SFQjda-WMN2Q-QDaLEPNS8", 
            authDomain: "lojinha-da-sogra.firebaseapp.com", 
            projectId: "lojinha-da-sogra", 
            storageBucket: "lojinha-da-sogra.firebasestorage.app", 
            messagingSenderId: "637321141515", 
            appId: "1:637321141515:web:715fdc3a661491d7e4d60e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let listaDeProdutos = []; 
        let categoriaAtual = 'Todas'; 
        let generoAtual = 'Todos';
        let carrinho = [];

        async function carregarProdutos() {
            const snap = await getDocs(collection(db, "produtos"));
            listaDeProdutos = [];
            snap.forEach(doc => listaDeProdutos.push({ ...doc.data(), id: doc.id }));
            renderizarVitrine();
        }

        window.filtrarCategoria = (cat) => {
            categoriaAtual = cat;
            document.querySelectorAll('#nav-categorias button').forEach(b => b.classList.remove('ativo'));
            event.target.classList.add('ativo');
            renderizarVitrine();
        };

        window.filtrarGenero = (gen) => {
            generoAtual = gen;
            document.querySelectorAll('#nav-genero button').forEach(b => b.classList.remove('ativo'));
            event.target.classList.add('ativo');
            renderizarVitrine();
        };

        function renderizarVitrine() {
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = "";
            let filtrados = listaDeProdutos;
            
            if (categoriaAtual !== 'Todas') filtrados = filtrados.filter(p => p.categoria === categoriaAtual);
            if (generoAtual !== 'Todos') filtrados = filtrados.filter(p => p.genero === generoAtual);

            if(filtrados.length === 0) {
                vitrine.innerHTML = "<p style='grid-column: 1/-1; text-align:center; padding: 50px;'>Nenhum produto nesta categoria ainda.</p>";
                return;
            }

            filtrados.forEach(p => {
                const img = p.imagens ? p.imagens[0] : p.imagem;
                vitrine.innerHTML += `
                    <div class="produto">
                        <img src="${img}">
                        <h3>${p.nome}</h3>
                        <p><strong>R$ ${Number(p.preco).toFixed(2)}</strong></p>
                        <button class="btn-adicionar" onclick="adicionar('${p.nome}', ${p.preco})">Adicionar</button>
                    </div>`;
            });
        }

        window.adicionar = (nome, preco) => {
            carrinho.push({nome, preco});
            document.getElementById('carrinho').className = 'carrinho-visivel';
            const total = carrinho.reduce((sum, i) => sum + i.preco, 0);
            document.getElementById('valor-total').innerText = total.toFixed(2);
            document.getElementById('itens-carrinho').innerHTML = carrinho.map(i => `<p>• ${i.nome}</p>`).join('');
        }

        window.voltarParaLoja = () => document.getElementById('carrinho').className = 'carrinho-oculto';

        window.enviarParaWhatsApp = () => {
            let msg = "*Novo Pedido TeAura*\n\n";
            carrinho.forEach(i => msg += `- ${i.nome}\n`);
            msg += `\n*Total: R$ ${document.getElementById('valor-total').innerText}*`;
            window.open(`https://wa.me/${TELEFONE_WHATSAPP}?text=${encodeURIComponent(msg)}`);
        }

        carregarProdutos();
    </script>
</body>
</html>
