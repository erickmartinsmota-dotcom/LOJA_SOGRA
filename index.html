<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeAura Boutique | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #1E5631; --dourado: #D4AF37; --creme: #FDFBF7; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--creme); margin: 0; color: #333; }
        
        header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        header h1 { font-family: 'Cinzel', serif; color: var(--verde); margin: 0; font-size: 1.8rem; letter-spacing: 2px; }

        /* Filtros */
        .filtros { display: flex; justify-content: center; gap: 10px; padding: 20px; flex-wrap: wrap; background: #fff; border-bottom: 1px solid #eee; }
        .filtros select { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-family: 'Montserrat', sans-serif; outline: none; }

        /* Vitrine */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; position: relative; }
        .card img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .card-info h3 { font-size: 0.9rem; margin: 10px 0; color: #444; text-transform: uppercase; }
        .card-info .preco { color: var(--verde); font-weight: bold; font-size: 1.1rem; }

        /* SEÇÃO DE CONTATO WHATSAPP (NOVA) */
        .secao-contato { background: white; padding: 40px 20px; text-align: center; border-top: 1px solid #eee; margin-top: 40px; }
        .contato-container { max-width: 400px; margin: 0 auto; }
        .secao-contato h3 { font-family: 'Cinzel', serif; color: var(--verde); margin-bottom: 10px; }
        .campo-nome { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-family: 'Montserrat', sans-serif; box-sizing: border-box; }
        .btn-whatsapp { width: 100%; background: #25D366; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-whatsapp:hover { background: #1ebd59; }

        footer { background: #1a1a1a; color: white; padding: 30px; text-align: center; font-size: 0.8rem; }
        .link-admin { color: #555; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>

    <header>
        <h1>TE AURA BOUTIQUE</h1>
    </header>

    <div class="filtros">
        <select id="filtro-genero" onchange="window.filtrar()">
            <option value="Todos">Todos os Gêneros</option>
            <option value="Feminino">Feminino</option>
            <option value="Masculino">Masculino</option>
        </select>
        <select id="filtro-categoria" onchange="window.filtrar()">
            <option value="Todas">Todas as Categorias</option>
            <option value="Kits Mães">🎁 Kits Dia das Mães</option>
            <option value="Loções">Loções</option>
            <option value="Perfumes">Perfumes</option>
            <option value="Bolsas">Bolsas</option>
            <option value="Roupas">Roupas</option>
            <option value="Sapatos">Sapatos</option>
        </select>
    </div>

    <main>
        <div id="vitrine-produtos" class="vitrine"></div>

        <section class="secao-contato">
            <div class="contato-container">
                <h3>Ficou com alguma dúvida?</h3>
                <p>Digite seu nome para nos chamar no WhatsApp:</p>
                <input type="text" id="nome-cliente" placeholder="Seu nome aqui..." class="campo-nome">
                <button onclick="enviarWhatsapp()" class="btn-whatsapp">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="20" height="20">
                    Chamar no WhatsApp
                </button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 TeAura Boutique</p>
        <a href="login.html" class="link-admin">Acesso Restrito</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCA00i6Jpjk_SFQjda-WMN2Q-QDaLEPNS8", 
            authDomain: "lojinha-da-sogra.firebaseapp.com", 
            projectId: "lojinha-da-sogra", 
            storageBucket: "lojinha-da-sogra.firebasestorage.app", 
            messagingSenderId: "637321141515", 
            appId: "1:637321141515:web:715fdc3a661491d7e4d60e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let todosProdutos = [];

        async function carregar() {
            const snap = await getDocs(collection(db, "produtos"));
            todosProdutos = snap.docs.map(doc => doc.data());
            window.filtrar();
        }

        window.filtrar = () => {
            const gen = document.getElementById('filtro-genero').value;
            const cat = document.getElementById('filtro-categoria').value;
            const vitrine = document.getElementById('vitrine-produtos');
            
            let filtrados = todosProdutos.filter(p => {
                const bateG = gen === "Todos" || p.genero === gen;
                const bateC = cat === "Todas" || p.categoria === cat;
                return bateG && bateC;
            });

            vitrine.innerHTML = filtrados.map(p => `
                <div class="card">
                    <img src="${p.imagem}" alt="${p.nome}">
                    <div class="card-info">
                        <h3>${p.nome}</h3>
                        <p class="preco">R$ ${Number(p.preco).toFixed(2)}</p>
                    </div>
                </div>
            `).join('');
        };

        carregar();
    </script>

    <script>
        function enviarWhatsapp() {
            const nome = document.getElementById('nome-cliente').value.trim();
            const seuTelefone = "55219XXXXXXXX"; // <-- COLOQUE SEU NÚMERO AQUI

            if (!nome) {
                alert("Por favor, digite seu nome.");
                return;
            }

            const msg = encodeURIComponent(`Olá! Meu nome é ${nome}, vi os produtos no site e gostaria de tirar uma dúvida.`);
            window.open(`https://api.whatsapp.com/send?phone=${seuTelefone}&text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
