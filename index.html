<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeAura Boutique | Cosméticos & Moda</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --dourado: #D4AF37; 
            --verde-luxo: #1E5631; 
            --branco-creme: #FDFBF7; 
            --preto-suave: #222; 
        }

        /* FUNDO DE MÁRMORE */
        body { 
            margin: 0; 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--branco-creme); 
            background-image: url('https://www.transparenttextures.com/patterns/white-marble.png'); 
            color: var(--preto-suave); 
        }

        /* CABEÇALHO COMPLETO FIXO (Logo + Menus) */
        .cabecalho-global {
            position: sticky; top: 0; z-index: 1000;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 15px 5px 12px 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            border-bottom: 2px solid #E5D3B3;
        }
        .logo-compacto {
            font-family: 'Cinzel', serif; font-size: 2.2rem; margin: 0 0 5px 0; letter-spacing: 3px;
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700;
        }
        .luxury-subtitle-compacto {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; color: var(--dourado); margin-bottom: 15px; display: block;
        }

        /* NAVEGAÇÃO / BOTÕES */
        #nav-categorias { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        #nav-categorias button { 
            background: white; border: 1px solid var(--verde-luxo); color: var(--verde-luxo); 
            padding: 8px 16px; cursor: pointer; transition: 0.3s; font-family: 'Montserrat', sans-serif; 
            font-weight: 600; border-radius: 4px; font-size: 0.85rem;
        }
        #nav-categorias button:hover, #nav-categorias button.ativo { background-color: var(--verde-luxo); color: white; }

        /* Estilo especial para o botão ativo de Dia das Mães */
        #nav-categorias button.btn-maes:hover, #nav-categorias button.btn-maes.ativo { background-color: #c9184a !important; color: white !important; border-color: #c9184a !important; }

        .nav-genero { 
            margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; 
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; 
        }
        .nav-genero button { 
            border: 1px solid var(--dourado); color: var(--dourado); border-radius: 20px; 
            font-size: 0.75rem; padding: 6px 18px; cursor: pointer; transition: 0.3s; background: white;
            font-weight: 600; text-transform: uppercase;
        }
        .nav-genero button:hover, .nav-genero button.ativo { background-color: var(--dourado); color: white; }

        /* VITRINE */
        .titulo-colecao { 
            font-family: 'Cinzel', serif; text-align: center; color: var(--verde-luxo); 
            font-size: 2.2rem; margin: 40px 0 30px 0; text-transform: uppercase; letter-spacing: 2px; 
        }
        .container { max-width: 1200px; margin: 0 auto 60px auto; padding: 0 20px; }
        #vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        /* CARTÃO DO PRODUTO */
        .produto { 
            background: white; padding: 20px; text-align: center; border-radius: 15px; 
            transition: 0.4s; border: 1px solid #E5D3B3; box-shadow: 0 8px 25px rgba(0,0,0,0.05); 
        }
        .produto:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.12); }
        .produto img.img-principal { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; transition: 0.3s; }
        
        /* GALERIA MINIATURAS */
        .galeria-miniaturas { display: flex; justify-content: center; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; }
        .miniatura { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; opacity: 0.6; transition: 0.2s; }
        .miniatura:hover { opacity: 1; border-color: var(--dourado); }

        /* SELETOR DE TAMANHOS (Botões) */
        .seletor-tamanhos { display: flex; justify-content: center; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        .btn-tamanho { 
            border: 1px solid #ddd; background: white; padding: 5px 12px; min-width: 40px;
            cursor: pointer; border-radius: 4px; font-size: 0.8rem; transition: 0.2s; color: #555;
        }
        .btn-tamanho:hover { border-color: var(--dourado); }
        .btn-tamanho.selecionado { background-color: var(--dourado); color: white; border-color: var(--dourado); font-weight: bold; }

        .produto button.btn-adicionar { 
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728); 
            color: #442d00; font-weight: bold; border: none; padding: 14px; 
            width: 100%; cursor: pointer; margin-top: 15px; border-radius: 25px; 
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
        }

        /* CARRINHO */
        .carrinho-oculto { display: none; }
        .carrinho-visivel { 
            position: fixed; right: 0; top: 0; width: 350px; height: 100%; 
            background: white; box-shadow: -5px 0 25px rgba(0,0,0,0.15); 
            padding: 25px; z-index: 2000; overflow-y: auto; 
        }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-whatsapp { background-color: #25D366; color: white; border: none; padding: 16px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1rem; }
    </style>
</head>
<body>

    <header class="cabecalho-global">
        <h1 class="logo-compacto">TE AURA</h1>
        <span class="luxury-subtitle-compacto">Boutique | Cosméticos & Moda</span>
        
        <nav id="nav-categorias">
            <button onclick="filtrarCategoria('Todas')" class="ativo">Todas</button>
            <button onclick="filtrarCategoria('Kits Mães')" class="btn-maes" style="border-color: #c9184a; color: #c9184a;">🎁 Dia das Mães</button>
            <button onclick="filtrarCategoria('Loções')">Loções</button>
            <button onclick="filtrarCategoria('Perfumes')">Perfumes</button>
            <button onclick="filtrarCategoria('Bolsas')">Bolsas</button>
            <button onclick="filtrarCategoria('Roupas')">Roupas</button>
            <button onclick="filtrarCategoria('Sapatos')">Sapatos</button>
            <button onclick="filtrarCategoria('Outros')">Outros</button>
        </nav>
        
        <nav class="nav-genero" id="nav-genero">
            <button onclick="filtrarGenero('Todos')" class="ativo">Todos os Gêneros</button>
            <button onclick="filtrarGenero('Feminino')">Feminino</button>
            <button onclick="filtrarGenero('Masculino')">Masculino</button>
        </nav>
    </header>

    <div class="container">
        <h2 class="titulo-colecao">Coleção Exclusiva TeAura</h2>
        <div id="vitrine">
            </div>
    </div>

    <div id="carrinho" class="carrinho-oculto">
        <button onclick="voltarParaLoja()" style="float: right; border: none; background: none; font-weight: bold; cursor: pointer; color: red;">[X] FECHAR</button>
        <h3 style="font-family: 'Cinzel', serif; color: var(--verde-luxo);">Seu Carrinho</h3>
        <div id="itens-carrinho" style="margin: 20px 0;"></div>
        <hr>
        <p style="font-size: 1.2rem;"><strong>Total: R$ <span id="valor-total">0.00</span></strong></p>
        <input type="text" id="nomeCliente" placeholder="Seu Nome Completo">
        <textarea id="enderecoCliente" placeholder="Endereço Completo para Entrega" rows="3"></textarea>
        <button class="btn-whatsapp" onclick="enviarParaWhatsApp()">🚀 Finalizar no WhatsApp</button>
        <button onclick="limparCarrinho()" style="margin-top: 15px; background: none; border: none; color: #999; cursor: pointer; width: 100%;">Esvaziar Carrinho</button>
    </div>

    <footer style="background-color: transparent; border-top: 1px solid #E5D3B3; text-align: center; padding: 50px 20px; margin-top: 60px;">
        <h2 style="font-family: 'Cinzel', serif; color: var(--verde-luxo); margin: 0; font-size: 2rem; letter-spacing: 2px;">
            <span style="font-size: 1.2rem; margin-right: 5px; color: var(--dourado);">⚜️</span> TE AURA
        </h2>
        <p style="font-size: 0.85rem; color: #666; margin: 15px 0; font-weight: 600;">
            © TeAura Boutique - Excelência em Cosméticos e Moda
        </p>
        <div style="margin-top: 20px;">
            <a href="admin.html" style="color: var(--dourado); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; transition: 0.3s;">
                2026
            </a>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const TELEFONE_WHATSAPP = "558695105264"; 
        const CHAVE_PIX_LOJA = "86 9510-5264 (Terezinha da silva ferreira)";

        const firebaseConfig = { 
            apiKey: "AIzaSyCA00i6Jpjk_SFQjda-WMN2Q-QDaLEPNS8", 
            authDomain: "lojinha-da-sogra.firebaseapp.com", 
            projectId: "lojinha-da-sogra", 
            storageBucket: "lojinha-da-sogra.firebasestorage.app", 
            messagingSenderId: "637321141515", 
            appId: "1:637321141515:web:715fdc3a661491d7e4d60e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let carrinho = []; 
        let listaDeProdutos = []; 
        let categoriaAtual = 'Todas'; 
        let generoAtual = 'Todos';

        async function carregarProdutos() {
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = "<h3 style='grid-column: 1/-1; text-align:center; padding: 50px;'>Carregando coleção luxuosa... ⏳</h3>";
            
            try {
                const querySnapshot = await getDocs(collection(db, "produtos"));
                listaDeProdutos = []; 
                querySnapshot.forEach((doc) => {
                    let p = doc.data(); p.id = doc.id;
                    if(!p.categoria) p.categoria = "Outros"; 
                    if(!p.genero) p.genero = "Todos";
                    listaDeProdutos.push(p);
                });
                renderizarVitrine();
            } catch (erro) { 
                console.error("Erro ao carregar:", erro);
                vitrine.innerHTML = `<h3 style='grid-column: 1/-1; text-align:center; color: red;'>Erro de conexão. Verifique o Console (F12).</h3>`;
            }
        }

        window.filtrarCategoria = (cat) => {
            categoriaAtual = cat;
            document.querySelectorAll('#nav-categorias button').forEach(b => b.classList.remove('ativo'));
            if(window.event && window.event.target) window.event.target.classList.add('ativo');
            renderizarVitrine();
        };

        window.filtrarGenero = (gen) => {
            generoAtual = gen;
            document.querySelectorAll('#nav-genero button').forEach(b => b.classList.remove('ativo'));
            if(window.event && window.event.target) window.event.target.classList.add('ativo');
            renderizarVitrine();
        };

        // Função para pintar o botão de tamanho clicado
        window.selecionarTamanho = (botao, idProduto) => {
            const container = botao.parentElement;
            container.querySelectorAll('.btn-tamanho').forEach(b => b.classList.remove('selecionado'));
            botao.classList.add('selecionado');
        };

        function renderizarVitrine() {
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = "";
            
            let filtrados = listaDeProdutos;
            if (categoriaAtual !== 'Todas') filtrados = filtrados.filter(p => p.categoria === categoriaAtual);
            if (generoAtual !== 'Todos') filtrados = filtrados.filter(p => p.genero === generoAtual);

            if(filtrados.length === 0) {
                vitrine.innerHTML = `<h3 style='grid-column: 1 / -1; text-align:center; padding: 80px; color: #999;'>Nenhum item encontrado nesta categoria.</h3>`;
                return;
            }

            filtrados.forEach((p) => {
                let tagGenero = p.genero !== 'Todos' ? ` | ${p.genero}` : '';
                let arrayImgs = p.imagens && p.imagens.length > 0 ? p.imagens : [p.imagem || 'https://via.placeholder.com/300'];
                let imgPrincipal = arrayImgs[0];
                
                // Monta miniaturas se houver
                let htmlMiniaturas = "";
                if(arrayImgs.length > 1) {
                    htmlMiniaturas = `<div class="galeria-miniaturas">`;
                    arrayImgs.forEach(link => {
                        htmlMiniaturas += `<img src="${link}" class="miniatura" onclick="document.getElementById('img-main-${p.id}').src='${link}'">`;
                    });
                    htmlMiniaturas += `</div>`;
                }

                // Monta botões de tamanho se houver
                let htmlTamanhos = "";
                if (p.tamanhos) {
                    const listaTam = p.tamanhos.split(',').map(t => t.trim());
                    htmlTamanhos = `<div class="seletor-tamanhos" id="tamanhos-${p.id}">`;
                    listaTam.forEach(tam => {
                        htmlTamanhos += `<button class="btn-tamanho" onclick="selecionarTamanho(this, '${p.id}')">${tam}</button>`;
                    });
                    htmlTamanhos += `</div>`;
                }

                let nomeSeguro = p.nome ? p.nome.replace(/'/g, "&apos;") : "Produto";

                vitrine.innerHTML += `
                    <div class="produto">
                        <img id="img-main-${p.id}" src="${imgPrincipal}" class="img-principal" onerror="this.src='https://via.placeholder.com/300?text=Sem+Foto'">
                        ${htmlMiniaturas}
                        <p style="font-size: 10px; color: #999; margin: 15px 0 0 0; text-transform:uppercase; font-weight: 600;">${p.categoria}${tagGenero}</p>
                        <h3 style="margin: 5px 0; font-family: 'Cinzel', serif; color: var(--verde-luxo);">${p.nome}</h3>
                        
                        ${htmlTamanhos}
                        
                        <p style="font-size: 0.85rem; color: #777; margin: 5px 0;">${p.descricao}</p>
                        <p><strong style="color: var(--verde-luxo); font-size: 1.3rem;">R$ ${Number(p.preco).toFixed(2)}</strong></p>
                        <button class="btn-adicionar" onclick="adicionarAoCarrinho('${p.id}', '${nomeSeguro}', ${p.preco})">Adicionar ao Carrinho</button>
                    </div>`;
            });
        }

        window.adicionarAoCarrinho = (id, nome, preco) => { 
            let nomeFinal = nome;
            const containerTamanhos = document.getElementById(`tamanhos-${id}`);
            
            // Verifica a seleção de tamanho
            if (containerTamanhos) {
                const selecionado = containerTamanhos.querySelector('.btn-tamanho.selecionado');
                if (!selecionado) {
                    alert("⚠️ Por favor, selecione um tamanho antes de adicionar ao carrinho!");
                    return;
                }
                nomeFinal = `${nome} (Tam: ${selecionado.innerText})`;
            }

            carrinho.push({ nome: nomeFinal, preco: preco }); 
            document.getElementById('carrinho').className = 'carrinho-visivel'; 
            
            const total = carrinho.reduce((sum, i) => sum + i.preco, 0);
            document.getElementById('valor-total').innerText = total.toFixed(2);
            document.getElementById('itens-carrinho').innerHTML = carrinho.map(i => `<p style="border-bottom: 1px solid #eee; padding: 5px 0;">• ${i.nome} <br> <span style="color: var(--verde-luxo); font-weight: bold;">R$ ${i.preco.toFixed(2)}</span></p>`).join('');
        };

        window.enviarParaWhatsApp = () => { 
            const nome = document.getElementById('nomeCliente').value;
            const endereco = document.getElementById('enderecoCliente').value;
            const total = document.getElementById('valor-total').innerText;
            
            if (!nome || !endereco || carrinho.length === 0) { 
                alert("Por favor, preencha o seu nome, endereço e adicione produtos!"); 
                return; 
            }

            let msg = `*🛍️ NOVO PEDIDO - TeAura Boutique*\n\n`;
            msg += `*Cliente:* ${nome}\n`;
            msg += `*Endereço:* ${endereco}\n\n`;
            msg += `*PRODUTOS:*\n`;
            carrinho.forEach(item => msg += `• ${item.nome}: R$ ${item.preco.toFixed(2)}\n`);
            msg += `\n*TOTAL: R$ ${total}*`;
            msg += `\n\n*Pagamento via Pix:* \n${CHAVE_PIX_LOJA}`;

            window.open(`https://wa.me/${TELEFONE_WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.voltarParaLoja = () => document.getElementById('carrinho').className = 'carrinho-oculto';
        
        window.limparCarrinho = () => { 
            if(confirm("Deseja realmente limpar o carrinho?")) { 
                carrinho = []; 
                document.getElementById('valor-total').innerText = "0.00";
                document.getElementById('itens-carrinho').innerHTML = ""; 
                voltarParaLoja(); 
            }
        };

        carregarProdutos();
    </script>
</body>
</html>
