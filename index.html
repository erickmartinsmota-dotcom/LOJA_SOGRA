<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeAura Boutique | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #1E5631; --dourado: #D4AF37; --creme: #FDFBF7; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--creme); margin: 0; color: #333; }
        
        header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        header h1 { font-family: 'Cinzel', serif; color: var(--verde); margin: 0; font-size: 1.8rem; letter-spacing: 2px; }

        /* Estilo da vitrine de produtos */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .card-info h3 { font-size: 1rem; margin: 10px 0; color: #444; }
        .card-info .preco { color: var(--verde); font-weight: bold; font-size: 1.1rem; }

        /* Seção de Contato WhatsApp */
        .secao-contato { background: white; padding: 60px 20px; text-align: center; border-top: 1px solid #eee; margin-top: 40px; }
        .contato-container { max-width: 400px; margin: 0 auto; }
        .secao-contato h3 { font-family: 'Cinzel', serif; color: var(--verde); font-size: 1.5rem; margin-bottom: 10px; }
        .secao-contato p { font-size: 0.9rem; color: #666; margin-bottom: 25px; }
        
        .campo-nome { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-family: 'Montserrat', sans-serif; font-size: 1rem; outline: none; box-sizing: border-box; transition: 0.3s; }
        .campo-nome:focus { border-color: var(--dourado); box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }

        .btn-whatsapp { width: 100%; background: #25D366; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; transition: 0.3s; text-transform: uppercase; }
        .btn-whatsapp:hover { background: #1ebd59; transform: scale(1.02); }

        footer { background: #1a1a1a; color: white; padding: 40px 20px; text-align: center; font-size: 0.8rem; }
        .link-admin { color: #555; text-decoration: none; margin-top: 20px; display: inline-block; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header>
        <h1>TE AURA BOUTIQUE</h1>
    </header>

    <main>
        <div id="vitrine-produtos" class="vitrine">
            </div>

        <section class="secao-contato">
            <div class="contato-container">
                <h3>Gostou de algum produto?</h3>
                <p>Digite seu nome abaixo para iniciar o atendimento no WhatsApp:</p>

                <input type="text" id="nome-cliente" placeholder="Seu nome completo" class="campo-nome">
                
                <button onclick="enviarWhatsapp()" class="btn-whatsapp">
                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="20" height="20" alt="WhatsApp Icon">
                    Falar com a Vendedora
                </button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 TeAura Boutique - Elegância e Estilo</p>
        <a href="login.html" class="link-admin">Acesso Restrito</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCA00i6Jpjk_SFQjda-WMN2Q-QDaLEPNS8", 
            authDomain: "lojinha-da-sogra.firebaseapp.com", 
            projectId: "lojinha-da-sogra", 
            storageBucket: "lojinha-da-sogra.firebasestorage.app", 
            messagingSenderId: "637321141515", 
            appId: "1:637321141515:web:715fdc3a661491d7e4d60e" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarProdutos() {
            const vitrine = document.getElementById('vitrine-produtos');
            const querySnapshot = await getDocs(collection(db, "produtos"));
            
            vitrine.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const p = doc.data();
                vitrine.innerHTML += `
                    <div class="card">
                        <img src="${p.imagem}" alt="${p.nome}">
                        <div class="card-info">
                            <h3>${p.nome}</h3>
                            <p class="preco">R$ ${Number(p.preco).toFixed(2)}</p>
                        </div>
                    </div>
                `;
            });
        }
        carregarProdutos();
    </script>

    <script>
        function enviarWhatsapp() {
            const nomeInput = document.getElementById('nome-cliente');
            const nome = nomeInput.value.trim();
            
            // INSIRA O NÚMERO DE WHATSAPP AQUI (DDD + NÚMERO)
            const seuTelefone = "55219XXXXXXXX"; 

            if (nome === "") {
                alert("Por favor, informe seu nome para iniciarmos o atendimento.");
                nomeInput.focus();
                return;
            }

            const mensagem = `Olá! Meu nome é ${nome} e acabo de visitar o site TeAura Boutique. Gostaria de mais informações sobre os produtos!`;
            const linkZap = `https://api.whatsapp.com/send?phone=${seuTelefone}&text=${encodeURIComponent(mensagem)}`;

            window.open(linkZap, '_blank');
        }
    </script>

</body>
</html>
