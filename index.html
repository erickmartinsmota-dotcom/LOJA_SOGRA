<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeAura Boutique | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #1E5631; --dourado: #D4AF37; --creme: #FDFBF7; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--creme); margin: 0; color: #333; }
        
        header { background: white; padding: 25px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        header h1 { font-family: 'Cinzel', serif; color: var(--verde); margin: 0; font-size: 2rem; letter-spacing: 3px; }

        /* Filtros */
        .filtros { display: flex; justify-content: center; gap: 15px; padding: 20px; background: white; border-bottom: 1px solid #eee; flex-wrap: wrap; }
        .filtros select { padding: 12px; border-radius: 5px; border: 1px solid #ddd; background: white; font-family: 'Montserrat', sans-serif; cursor: pointer; min-width: 180px; }

        /* Vitrine */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #f0f0f0; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; flex-grow: 1; }
        .card-info h3 { font-family: 'Cinzel', serif; font-size: 0.95rem; margin-bottom: 10px; text-transform: uppercase; }
        .card-info .preco { color: var(--verde); font-weight: bold; font-size: 1.2rem; }

        .btn-comprar { background: var(--verde); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        .btn-comprar:hover { background: #143d22; }

        /* MODAL (JANELA FLUTUANTE) */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content h2 { font-family: 'Cinzel', serif; color: var(--verde); margin-bottom: 15px; }
        .modal-content input { 
            width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; 
            border-radius: 6px; box-sizing: border-box; font-family: 'Montserrat', sans-serif;
        }
        .modal-buttons { display: flex; flex-direction: column; gap: 10px; }
        .btn-finalizar { background: #25D366; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-continuar { background: #eee; color: #555; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        footer { background: #111; color: white; padding: 40px; text-align: center; margin-top: 50px; }
        .link-admin { color: #444; text-decoration: none; font-size: 0.7rem; display: block; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>TE AURA BOUTIQUE</h1>
    </header>

    <div class="filtros">
        <select id="filtro-genero" onchange="window.filtrar()">
            <option value="Todos">Todos os Gêneros</option>
            <option value="Feminino">Feminino</option>
            <option value="Masculino">Masculino</option>
        </select>
        <select id="filtro-categoria" onchange="window.filtrar()">
            <option value="Todas">Todas as Categorias</option>
            <option value="Kits Mães">🎁 Kits Dia das Mães</option>
            <option value="Loções">Loções</option>
            <option value="Perfumes">Perfumes</option>
            <option value="Bolsas">Bolsas</option>
            <option value="Roupas">Roupas</option>
            <option value="Sapatos">Sapatos</option>
        </select>
    </div>

    <main>
        <div id="vitrine-produtos" class="vitrine"></div>
    </main>

    <div id="modalCompra" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-titulo-produto">Produto</h2>
            <p id="modal-preco-produto" style="font-weight: bold; color: var(--verde);"></p>
            
            <label style="display:block; text-align:left; font-size: 0.8rem; margin-bottom: 5px;">SEU NOME COMPLETO:</label>
            <input type="text" id="nome-cliente" placeholder="Como podemos te chamar?">

            <div class="modal-buttons">
                <button class="btn-finalizar" onclick="window.finalizarPedido()">Finalizar Pedido (WhatsApp)</button>
                <button class="btn-continuar" onclick="window.fecharModal()">Continuar Comprando</button>
            </div>
        </div>
    </div>

    <footer>
        <p>TE AURA BOUTIQUE &copy; 2024</p>
        <a href="login.html" class="link-admin">Acesso Restrito</a>
    </footer>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCA00i6Jpjk_SFQjda-WMN2Q-QDaLEPNS8", 
        authDomain: "lojinha-da-sogra.firebaseapp.com", 
        projectId: "lojinha-da-sogra", 
        storageBucket: "lojinha-da-sogra.firebasestorage.app", 
        messagingSenderId: "637321141515", 
        appId: "1:637321141515:web:715fdc3a661491d7e4d60e" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let todosProdutos = [];
    
    // VARIÁVEIS DO CARRINHO
    let carrinho = []; 
    let produtoAtual = {};

    async function carregar() {
        const snap = await getDocs(collection(db, "produtos"));
        todosProdutos = snap.docs.map(doc => doc.data());
        window.filtrar();
    }

    window.filtrar = () => {
        const gen = document.getElementById('filtro-genero').value;
        const cat = document.getElementById('filtro-categoria').value;
        const vitrine = document.getElementById('vitrine-produtos');
        
        let filtrados = todosProdutos.filter(p => {
            const bateG = gen === "Todos" || p.genero === gen;
            const bateC = cat === "Todas" || p.categoria === cat;
            return bateG && bateC;
        });

        vitrine.innerHTML = filtrados.map(p => `
            <div class="card">
                <img src="${p.imagem}" alt="${p.nome}">
                <div class="card-info">
                    <h3>${p.nome}</h3>
                    <p class="preco">R$ ${Number(p.preco).toFixed(2)}</p>
                </div>
                <button class="btn-comprar" onclick="window.abrirModal('${p.nome}', '${p.preco}')">Adicionar ao Carrinho</button>
            </div>
        `).join('');
    };

    // ABRIR MODAL
    window.abrirModal = (nome, preco) => {
        produtoAtual = { nome, preco: parseFloat(preco) };
        document.getElementById('modal-titulo-produto').innerText = nome;
        document.getElementById('modal-preco-produto').innerText = `R$ ${produtoAtual.preco.toFixed(2)}`;
        document.getElementById('modalCompra').style.display = 'flex';
    };

    // BOTÃO CONTINUAR COMPRANDO
    window.fecharModal = () => {
        carrinho.push(produtoAtual); // Adiciona o item na lista
        alert(`${produtoAtual.nome} adicionado ao carrinho!`);
        document.getElementById('modalCompra').style.display = 'none';
    };

    // BOTÃO FINALIZAR PEDIDO
    window.finalizarPedido = () => {
        const nomeCli = document.getElementById('nome-cliente').value.trim();
        const fone = "55219XXXXXXXX"; // <-- SEU NÚMERO AQUI

        if (!nomeCli) {
            alert("Por favor, informe seu nome para finalizar o pedido.");
            return;
        }

        // Adiciona o último produto se ele ainda não foi para o carrinho
        if (produtoAtual.nome) {
            carrinho.push(produtoAtual);
            produtoAtual = {}; 
        }

        if (carrinho.length === 0) {
            alert("Seu carrinho está vazio!");
            return;
        }

        // Calcula o Total e monta a lista de texto
        let total = 0;
        let listaProdutosTexto = "";

        carrinho.forEach((item, index) => {
            total += item.preco;
            listaProdutosTexto += `${index + 1}. *${item.nome}* - R$ ${item.preco.toFixed(2)}\n`;
        });

        const totalFormatado = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        // Montagem da Mensagem Profissional
        const mensagem = encodeURIComponent(
            `Olá! Meu nome é ${nomeCli}.\n\n` +
            `Gostaria de finalizar o pedido dos seguintes itens:\n\n` +
            `${listaProdutosTexto}\n` +
            `*Valor Total do Pedido: ${totalFormatado}*\n\n` +
            `Poderia me informar as opções de pagamento e entrega?`
        );

        window.open(`https://api.whatsapp.com/send?phone=${fone}&text=${mensagem}`, '_blank');
        
        // Limpa o carrinho após enviar
        carrinho = [];
        document.getElementById('modalCompra').style.display = 'none';
    };

    carregar();
</script>
</body>
</html>
